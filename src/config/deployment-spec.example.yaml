# DogeOS Deployment Specification
# This file is the single source of truth for a DogeOS deployment.
# Use $ENV:VAR_NAME to reference environment variables for secrets.

version: "1.0"

metadata:
  name: dogeos-testnet
  environment: testnet
  description: "DogeOS Testnet Deployment on AWS EKS"
  owner: "team@example.com"
  tags:
    project: dogeos
    team: infrastructure

infrastructure:
  provider: aws
  aws:
    region: us-west-2
    accountId: "123456789012"
    eksClusterName: dogeos-testnet-cluster  # EKS cluster for Kubernetes/Helm workloads, not dummy-signers
    secretsPrefix: dogeos-testnet
    # Cluster creation settings (used when --create-cluster is specified)
    nodeType: m5.2xlarge        # EC2 instance type for worker nodes
    nodeCount: 3                # Number of worker nodes
    kubernetesVersion: "1.29"   # Kubernetes version
  # For GCP deployments:
  # provider: gcp
  # gcp:
  #   project: my-gcp-project
  #   region: us-central1
  #   gkeClusterName: dogeos-testnet-cluster
  #   secretsProject: my-gcp-project  # optional, defaults to project
  #   # Cluster creation settings (used when --create-cluster is specified)
  #   machineType: e2-standard-8  # GCE machine type for nodes
  #   nodeCount: 3                # Number of nodes
  #   kubernetesVersion: latest   # GKE version (or specific like "1.29")
  # For local/Kind deployments:
  # provider: local
  # local:
  #   useK8sSecrets: true  # use native K8s secrets instead of external-secrets
  namespace: default
  sequencerCount: 2
  bootnodeCount: 2
  # Sequencer/bootnode instance metadata is populated by `scrollsdk setup gen-keystore`.

network:
  l1ChainName: "Dogecoin Testnet"
  l2ChainName: "DogeOS Testnet"
  l1ChainId: 111111
  l2ChainId: 221122
  tokenSymbol: DOGE
  l1RpcEndpoint: "http://l1-interface:8545"
  l1RpcEndpointWebsocket: "ws://l1-interface:8546"
  l2RpcEndpoint: "http://l2-rpc:8545"

database:
  admin:
    host: db.example.com
    port: 5432
    username: admin
    password: "$ENV:DB_ADMIN_PASSWORD"
    database: postgres
    vpcHost: 10.0.0.5
    vpcPort: 5432
  databases:
    rollupNode: rollup_node
    bridgeHistory: bridge_history
    gasOracle: gas_oracle
    coordinator: coordinator
    chainMonitor: chain_monitor
    rollupExplorer: rollup_explorer
    blockscout: blockscout
    adminSystem: admin_system

accounts:
  # Service accounts are generated by `scrollsdk setup gen-keystore`.
  # Public addresses are derived from generated/imported private keys.
  owner:
    address: "0x1234567890123456789012345678901234567891"

dogecoin:
  network: testnet
  rpc:
    url: "https://testnet.doge-rpc.io"
    username: "$ENV:DOGECOIN_RPC_USERNAME"
    password: "$ENV:DOGECOIN_RPC_PASSWORD"
  blockbook:
    apiUrl: "https://blockbook.testnet.doge.io/api/v2"
  walletPath: ".data/doge-wallet.json"

ethereumDa:
  chain: sepolia
  l1RpcUrl: "https://your-sepolia-execution-rpc.example"
  beaconRpcUrl: "https://your-sepolia-beacon-rpc.example"
  confirmationDepth: 1
  finalizationDepth: 64

bridge:
  seedString: "dogeos-testnet-seed-v1"
  thresholds:
    attestation: 2
    recovery: 2
  keyCounts:
    attestation: 3
    recovery: 3
  # TEE public key is populated by `scrollsdk setup dummy-signers`.
  timelock: 100
  feeRateSatsPerKvb: 1000000
  targetAmountsSats:
    sequencer: 420690000
    feeWallet: 500000000
    bridge: 5000000000
  confirmationsRequired: 1
  fees:
    depositFeeSats: "10000"
    withdrawalFeeWei: "100000000000000"
    minWithdrawalAmountWei: "1000000000000000"
  feeRecipient: "0x1234567890123456789012345678901234567896"

signing:
  # CubeSigner provides attestation keys. Roles are populated by `scrollsdk setup cubesigner-init`.
  cubesigner: {}
  # Dummy signer provides the TEE key. accountId/region default to infrastructure.aws;
  # networkAlias defaults to metadata.name; ecsClusterName defaults to "default".
  awsKms:
    accountId: "123456789012"
    region: us-west-2

frontend:
  protocol: https
  baseDomain: testnet.dogeos.io
  # Hostnames and external URLs are derived from baseDomain by default.
  subdomains:
    frontend: bridge
    bridgeHistoryApi: bridge-api
    rollupExplorerApi: rollup-api
    coordinatorApi: coordinator
    rpcGateway: rpc
    rpcGatewayWs: ws-rpc
    blockscout: blockscout
    adminDashboard: admin
    grafana: grafana
    tso: tso
    dogecoin: dogecoin
    blockbook: blockbook
  walletConnectProjectId: "your-walletconnect-project-id"

rollup:
  maxTxInChunk: 100
  maxBlockInChunk: 100
  maxBatchInBundle: 20
  maxL1MessageGasLimit: 10000000
  coordinator:
    chunkCollectionTimeSec: 60
    batchCollectionTimeSec: 300
    bundleCollectionTimeSec: 1800
  finalization:
    batchDeadlineSec: 86400
    relayMessageDeadlineSec: 86400

contracts:
  deploymentSalt: "dogeos-testnet-v1"
  l1FeeVaultAddr: "0x1234567890123456789012345678901234567897"
  gasOracle:
    blobScalar: 1
    scalar: 1
    penaltyThreshold: 100
    penaltyFactor: 10
  alternativeGasToken:
    enabled: false
  verification:
    l1VerifierType: blockscout
    l2VerifierType: blockscout
    # Explorer URIs default to frontend.externalUrls.l1Explorer/l2Explorer.

genesis:
  maxEthSupplyWei: "100000000000000000000000000000"
  deployerInitialBalanceWei: "1000000000000000000000000"
  baseFeePerGasWei: 1000000000

test:
  mockFinalizeEnabled: false

# Container image overrides (optional)
# Use this section to customize images for testing, development, or custom builds.
# All fields are optional - omit a service to use Helm chart defaults.
images:
  defaults:
    pullPolicy: IfNotPresent    # Default pull policy for all services

  services:
    # L2 Execution Layer (Geth-based)
    l2Sequencer:
      repository: scrolltech/l2geth
      tag: scroll-v5.9.6
    l2Rpc:
      repository: scrolltech/l2geth
      tag: scroll-v5.9.6
    l2Bootnode:
      repository: scrolltech/l2geth
      tag: scroll-v5.9.6

    # Rollup Services
    coordinator:
      repository: scrolltech/coordinator
      tag: v4.4.91
    ethDaSubmitter:
      repository: dogeos69/eth-da-submitter
      tag: latest
    gasOracle:
      repository: scrolltech/gas-oracle
      tag: v4.4.91
    chainMonitor:
      repository: scrolltech/chain-monitor
      tag: chain-monitor-v4.4.91

    # Bridge Services
    bridgeHistoryApi:
      repository: scrolltech/bridge-history-api
      tag: v4.4.91
    bridgeHistoryFetcher:
      repository: scrolltech/bridge-history-fetcher
      tag: v4.4.91
    withdrawalProcessor:
      repository: scrolltech/withdrawal-processor
      tag: v4.4.91
    tsoService:
      repository: scrolltech/tso-service
      tag: v4.4.91
    cubesignerSigner:
      repository: scrolltech/cubesigner-signer
      tag: v4.4.91

    # Frontend & Explorers
    frontends:
      repository: scrolltech/frontends
      tag: latest
    rollupExplorerBackend:
      repository: scrolltech/rollup-explorer-backend
      tag: v4.4.91
    # blockscout:
    #   repository: blockscout/blockscout
    #   tag: 6.3.0

    # Infrastructure
    # l1Interface:
    #   repository: scrolltech/l1-devnet
    #   tag: latest
